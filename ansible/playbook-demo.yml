---
- name: Task 4 - Fleet maintenance and OS-specific services
  hosts: all
  become: true
  gather_facts: true
  vars:
    # Demo mode keeps progressing even when some package streams conflict.
    demo_resilient_mode: true

  handlers:
    - name: Restart apache
      ansible.builtin.service:
        name: apache2
        state: restarted
      when: ansible_facts['os_family'] == 'Debian'

  tasks:
    - name: Refresh apt package index (Ubuntu/Debian)
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      when: ansible_facts['os_family'] == 'Debian'

    - name: Refresh dnf package metadata (Amazon Linux)
      ansible.builtin.dnf:
        update_cache: true
      when: ansible_facts['distribution'] == 'Amazon' and ansible_facts['pkg_mgr'] == 'dnf'

    - name: Refresh yum package metadata (Amazon Linux legacy)
      ansible.builtin.yum:
        update_cache: true
      when: ansible_facts['distribution'] == 'Amazon' and ansible_facts['pkg_mgr'] == 'yum'

    - name: Upgrade packages on Ubuntu/Debian
      ansible.builtin.apt:
        upgrade: dist
      when: ansible_facts['os_family'] == 'Debian'

    - name: Upgrade all packages on Amazon Linux (dnf)
      ansible.builtin.dnf:
        name: "*"
        state: latest
        update_only: true
        skip_broken: "{{ demo_resilient_mode }}"
      when: ansible_facts['distribution'] == 'Amazon' and ansible_facts['pkg_mgr'] == 'dnf'

    - name: Upgrade all packages on Amazon Linux (yum)
      ansible.builtin.yum:
        name: "*"
        state: latest
        update_only: true
        skip_broken: "{{ demo_resilient_mode }}"
      when: ansible_facts['distribution'] == 'Amazon' and ansible_facts['pkg_mgr'] == 'yum'

    - name: Ensure Apache is installed on Ubuntu/Debian
      ansible.builtin.apt:
        name: apache2
        state: present
      when: ansible_facts['os_family'] == 'Debian'

    - name: Deploy Hello World page on Ubuntu/Debian
      ansible.builtin.copy:
        dest: /var/www/html/index.html
        content: "Hello World\n"
        owner: root
        group: root
        mode: "0644"
      notify: Restart apache
      when: ansible_facts['os_family'] == 'Debian'

    - name: Ensure Apache service is enabled and started on Ubuntu/Debian
      ansible.builtin.service:
        name: apache2
        enabled: true
        state: started
      when: ansible_facts['os_family'] == 'Debian'

    - name: Ensure MariaDB is installed on Amazon Linux (AL2/AL2023)
      ansible.builtin.package:
        name: "{{ 'mariadb105-server' if (ansible_facts['distribution_major_version'] | int) >= 2023 else 'mariadb-server' }}"
        state: present
      when: ansible_facts['distribution'] == 'Amazon'

    - name: Ensure MariaDB service is enabled and started on Amazon Linux
      ansible.builtin.service:
        name: mariadb
        enabled: true
        state: started
      when: ansible_facts['distribution'] == 'Amazon'
